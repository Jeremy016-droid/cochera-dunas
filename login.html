<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cochera — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --negro:    #0a0a0a;
      --carbon:   #141414;
      --plomo:    #1e1e1e;
      --borde:    #2a2a2a;
      --texto:    #e8e8e0;
      --suave:    #888880;
      --amarillo: #f0c040;
      --rojo:     #e05050;
      --verde:    #50c080;
    }

    html, body {
      height: 100%;
      background: var(--negro);
      color: var(--texto);
      font-family: 'DM Mono', monospace;
    }

    /* ── fondo con rejilla ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--borde) 1px, transparent 1px),
        linear-gradient(90deg, var(--borde) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .35;
      pointer-events: none;
    }

    /* ── layout ── */
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    /* ── acento diagonal ── */
    .page::after {
      content: '';
      position: fixed;
      top: -30%; right: -10%;
      width: 55vw; height: 120vh;
      background: linear-gradient(135deg, transparent 40%, rgba(240,192,64,.04) 100%);
      pointer-events: none;
    }

    /* ── tarjeta ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--carbon);
      border: 1px solid var(--borde);
      border-radius: 2px;
      padding: 3rem 2.5rem 2.5rem;
      position: relative;
      animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
    }

    /* borde superior amarillo */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--amarillo);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── cabecera ── */
    .brand {
      margin-bottom: 2.5rem;
    }

    .brand-tag {
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--amarillo);
      margin-bottom: .5rem;
    }

    .brand-title {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      color: var(--texto);
      letter-spacing: -.02em;
    }

    .brand-title span {
      color: var(--amarillo);
    }

    .brand-sub {
      margin-top: .5rem;
      font-size: .72rem;
      color: var(--suave);
      letter-spacing: .05em;
    }

    /* ── campos ── */
    .campo {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--suave);
      margin-bottom: .45rem;
    }

    input {
      width: 100%;
      background: var(--plomo);
      border: 1px solid var(--borde);
      border-radius: 2px;
      padding: .75rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: .9rem;
      color: var(--texto);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus {
      border-color: var(--amarillo);
      box-shadow: 0 0 0 3px rgba(240,192,64,.1);
    }

    input::placeholder { color: #444; }

    /* ── error ── */
    .error-msg {
      display: none;
      align-items: center;
      gap: .5rem;
      background: rgba(224,80,80,.1);
      border: 1px solid rgba(224,80,80,.3);
      border-radius: 2px;
      padding: .65rem 1rem;
      font-size: .75rem;
      color: var(--rojo);
      margin-bottom: 1.25rem;
      animation: shake .3s ease;
    }
    .error-msg.visible { display: flex; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    /* ── botón ── */
    .btn {
      width: 100%;
      margin-top: .5rem;
      padding: .85rem 1rem;
      background: var(--amarillo);
      color: var(--negro);
      border: none;
      border-radius: 2px;
      font-family: 'Syne', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s, transform .1s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover  { background: #f5ce5a; }
    .btn:active { transform: scale(.98); }

    .btn.loading {
      pointer-events: none;
      background: #7a6020;
      color: #444;
    }

    .btn.loading::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
      animation: shimmer .8s infinite;
    }

    @keyframes shimmer {
      to { left: 100%; }
    }

    /* ── pie ── */
    .footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--borde);
      display: flex;
      justify-content: space-between;
      font-size: .65rem;
      color: #444;
    }

    .footer span { letter-spacing: .08em; }

    /* ── punto de estado ── */
    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--verde);
      margin-right: .4rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .3; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="card">

    <div class="brand">
      <div class="brand-tag">▪ Sistema de gestión</div>
      <div class="brand-title">COCHERA <span>DUNAS.</span></div>
      <div class="brand-sub">Control de acceso · Ingresa tus credenciales</div>
    </div>

    <div class="error-msg" id="errorMsg">
      <span>✕</span>
      <span id="errorTxt">Usuario o contraseña incorrectos.</span>
    </div>

    <div class="campo">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="operador" autocomplete="username" autofocus>
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn" id="btnLogin" onclick="login()">Ingresar</button>

    <div class="footer">
      <span><span class="status-dot"></span>API conectada</span>
      <span>COCHERA v1.0</span>
    </div>

  </div>
</div>

<script>
  const API = 'http://127.0.0.1:8000';

  // Verificar que la API está viva al cargar
  fetch(`${API}/tipos-vehiculo`)
    .then(() => {
      document.querySelector('.status-dot').style.background = 'var(--verde)';
    })
    .catch(() => {
      document.querySelector('.status-dot').style.background = 'var(--rojo)';
      document.querySelector('.footer span').innerHTML =
        '<span class="status-dot" style="background:var(--rojo)"></span>API desconectada';
    });

  // Enter en cualquier campo dispara login
  document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMsg');
    const errorTxt = document.getElementById('errorTxt');

    if (!username || !password) {
      mostrarError('Completa ambos campos.');
      return;
    }

    btn.classList.add('loading');
    btn.textContent = 'Verificando...';
    errorMsg.classList.remove('visible');

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (!res.ok) {
        mostrarError('Usuario o contraseña incorrectos.');
        return;
      }

      const usuario = await res.json();

      // Guardar sesión en localStorage
      localStorage.setItem('cochera_usuario', JSON.stringify(usuario));

      // Redirigir según rol
      if (usuario.rol === 'presidenta') {
        window.location.href = 'dashboard.html?modo=solo-lectura';
      } else {
        window.location.href = 'dashboard.html';
      }

    } catch (err) {
      mostrarError('No se pudo conectar con el servidor. ¿Está corriendo uvicorn?');
    } finally {
      btn.classList.remove('loading');
      btn.textContent = 'Ingresar';
    }
  }

  function mostrarError(msg) {
    const errorMsg = document.getElementById('errorMsg');
    const errorTxt = document.getElementById('errorTxt');
    errorTxt.textContent = msg;
    errorMsg.classList.remove('visible');
    void errorMsg.offsetWidth; // forzar reflow para re-animar
    errorMsg.classList.add('visible');
  }
</script>
</body>
</html>
